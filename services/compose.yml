services:

  ubuntu:
    container_name: ubuntu
    hostname: box
    build: ./ubuntu/build
    env_file:
      - ./ubuntu/.env
    volumes:
      - ./ubuntu/home:/home/me
      - ./ubuntu/opt:/opt/box:ro
      - ../data:/data

  excalidraw:
    build: ./excalidraw
    container_name: excalidraw
    ports:
      - "3000:3000"
    volumes:
      - ./excalidraw/src:/app/src:ro
      - ./excalidraw/frontend:/frontend:ro
    restart: unless-stopped

  graph-viewer:
    build: ./graph-viewer
    container_name: graph-viewer
    ports:
      - "5001:5000"
    volumes:
      - ./graph-viewer/app.py:/app/app.py:ro
      - ./graph-viewer/templates:/app/templates:ro
      - ./graph-viewer/static:/app/static:ro
      - ../data:/data:ro
    restart: unless-stopped
